name: Claude CVE
run-name: "Claude CVE ${{ (github.event_name == 'schedule' || inputs.dry_run == false) && ' (LIVE)' || ' (dry-run)' }}"

on:
  schedule:
    # Daily at 23:00 UTC — ~3h after the DocSpace-buildtools cron build (20:00 UTC).
    - cron: '0 23 * * *'
  workflow_dispatch:
    inputs:
      branches:
        description: 'Branches to scan (JSON array or space-separated). Empty = all active branches.'
        required: false
        type: string
      dry_run:
        description: 'Dry run: compute fixes and print them, do NOT push branches or open PRs.'
        required: false
        type: boolean
        default: true
      model:
        description: 'Claude model'
        required: false
        type: string
        default: claude-opus-4-8
      effort:
        description: 'Reasoning effort'
        required: false
        type: choice
        default: high
        options: [low, medium, high, xhigh, max]
      test_image:
        description: 'TEST: scan this exact image (e.g. a public onlyoffice/docspace-* release) instead of discovering the private 4testing images. Skips branch/tag discovery and needs no Docker Hub login.'
        required: false
        type: string

env:
  GITEA_HOST: ${{ secrets.CI_GITEA_HOST }}
  TRIVY_VERSION: "v0.72.0"

concurrency:
  group: claude-cve
  cancel-in-progress: false

jobs:
  claude-cve:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout ga-common
        uses: actions/checkout@v4

      - name: Set up Node + pnpm (for npm lockfile regeneration)
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Enable corepack/pnpm
        run: corepack enable || npm install -g pnpm

      - name: Install Trivy
        run: curl -sSfL "https://raw.githubusercontent.com/aquasecurity/trivy/${TRIVY_VERSION}/contrib/install.sh" | sudo sh -s -- -b /usr/local/bin "${TRIVY_VERSION}"

      - name: Login to Docker Hub
        # Non-fatal: public release images (test_image mode) need no login, and a
        # missing/empty DOCKERHUB secret must not abort the job.
        continue-on-error: true
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run Claude CVE
        env:
          GITEA_TOKEN: ${{ secrets.PAT_GITEA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_KEY_CLAUDE_CVE }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || (inputs.dry_run == false && 'false' || 'true') }}
          BRANCHES_OVERRIDE: ${{ inputs.branches }}
          CLAUDE_MODEL: ${{ inputs.model }}
          CLAUDE_EFFORT: ${{ inputs.effort }}
          TEST_IMAGE: ${{ inputs.test_image }}
        run: bash .gitea/scripts/claude-cve.sh
